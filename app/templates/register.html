<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rare Hashes - Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div id="header">
        <img id="mainImage" src="{{ url_for('static', filename='images/logo.png') }}" alt="Rare Hashes logo">
        <div id="menu">
            <a href="{{ url_for('main.default') }}"><button class="mainButton">Home</button></a>
            <a href="{{ url_for('view.view') }}"><button class="mainButton">View</button></a>
            <a href="{{ url_for('write.write') }}"><button class="mainButton">Write</button></a>
        </div>
    </div>

    <div class="content" id="mainContent" style="max-width:640px; margin:2rem auto;">
        <h2 style="margin-bottom:0.5rem;">Create an account</h2>
        <p style="margin-top:0; color:#475569;">Register to submit hashes and access the Rare Hashes community features.</p>

        <form id="registerForm" style="background:#ffffff; border-radius:20px; box-shadow:0 10px 30px rgba(15,23,42,0.08); padding:2rem; margin-top:1.5rem;">
            <label for="username" style="display:block; margin-bottom:0.75rem; font-weight:600;">Username</label>
            <input id="username" name="username" type="text" placeholder="Enter username" required style="width:100%; padding:0.85rem 1rem; margin-bottom:1rem; border:1px solid #cbd5e1; border-radius:12px; font-size:1rem;">

            <label for="email" style="display:block; margin-bottom:0.75rem; font-weight:600;">Email</label>
            <input id="email" name="email" type="email" placeholder="Enter email address" required style="width:100%; padding:0.85rem 1rem; margin-bottom:1rem; border:1px solid #cbd5e1; border-radius:12px; font-size:1rem;">

            <label for="password" style="display:block; margin-bottom:0.75rem; font-weight:600;">Password</label>
            <input id="password" name="password" type="password" placeholder="Create password" minlength="8" required style="width:100%; padding:0.85rem 1rem; margin-bottom:1rem; border:1px solid #cbd5e1; border-radius:12px; font-size:1rem;">
            <p style="margin-top:-0.75rem; margin-bottom:1rem; color:#64748b; font-size:0.95rem;">Password must be at least 8 characters.</p>

            <label for="confirmPassword" style="display:block; margin-bottom:0.75rem; font-weight:600;">Repeat Password</label>
            <input id="confirmPassword" name="confirmPassword" type="password" placeholder="Repeat password" minlength="8" required style="width:100%; padding:0.85rem 1rem; margin-bottom:1.25rem; border:1px solid #cbd5e1; border-radius:12px; font-size:1rem;">

            <button type="submit" class="mainButton" style="width:100%; padding:0.95rem 1rem; font-size:1rem;">Register</button>
        </form>

        <div id="registerFeedback" aria-live="polite" style="margin-top:1rem; min-height:1.5rem; color:#dc2626; font-weight:600;"></div>
    </div>

    <script src="{{ url_for('static', filename='register.js') }}"></script>
</body>
</html>
